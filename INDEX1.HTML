<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn CAD with Arun Banjare</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Background image path set to images folder */
        .hero-section { 
            position: relative;
            min-height: 100vh; 
            background: url('images/bg.jpg') no-repeat center center/cover; 
            display: flex;
            flex-direction: column;
        }

        /* Header styling */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 40px; 
            background: rgba(0, 0, 0, 0.6); 
            color: white; 
        }
        .logo-area { display: flex; align-items: center; }
        
        /* Logo styling */
        .logo-img { width: 60px; height: 60px; border-radius: 50%; margin-right: 15px; object-fit: cover; }

        /* Auth Container Box */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .auth-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
        }
        .auth-box h2 { margin-bottom: 20px; color: #333; text-align: center; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #555; font-weight: 600; font-size: 14px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; outline: none; font-size: 15px; }
        .input-group input:focus { border-color: #0056b3; }
        
        .auth-btn { width: 100%; padding: 12px; background: #0056b3; border: none; color: white; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .auth-btn:hover { background: #004085; }
        
        .switch-text { text-align: center; margin-top: 15px; font-size: 14px; color: #666; }
        .switch-text a { color: #0056b3; text-decoration: none; font-weight: bold; cursor: pointer; }
        .switch-text a:hover { text-decoration: underline; }

        /* Hide elements by default */
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="hero-section">
        <!-- Header with Logo -->
        <div class="header">
            <div class="logo-area">
                <img src="images/logo.png" alt="Logo" class="logo-img">
                <h2>Learn CAD with Arun Banjare</h2>
            </div>
        </div>

        <!-- Authentication Container -->
        <div class="main-container">
            <div class="auth-box">
                
                <!-- LOGIN FORM -->
                <div id="login-form">
                    <h2>User Login</h2>
                    <form onsubmit="return false;">
                        <div class="input-group">
                            <label>Email or Mobile Number</label>
                            <input type="text" placeholder="Enter your email or mobile" required>
                        </div>
                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" placeholder="Enter your password" required>
                        </div>
                        <button type="submit" class="auth-btn">Login</button>
                    </form>
                    <div class="switch-text">
                        Don't have an account? <a onclick="toggleForm('signup')">Sign Up Here</a>
                    </div>
                </div>

                <!-- SIGN UP FORM -->
                <div id="signup-form" class="hidden">
                    <h2>Create Account</h2>
                    <form onsubmit="return false;">
                        <div class="input-group">
                            <label>Full Name</label>
                            <input type="text" placeholder="Enter your full name" required>
                        </div>
                        <div class="input-group">
                            <label>Email Address</label>
                            <input type="email" placeholder="Enter your email address" required>
                        </div>
                        <div class="input-group">
                            <label>Mobile Number</label>
                            <input type="tel" placeholder="Enter your mobile number" required>
                        </div>
                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" placeholder="Create a password" required>
                        </div>
                        <button type="submit" class="auth-btn" style="background: #28a745;">Sign Up</button>
                    </form>
                    <div class="switch-text">
                        Already have an account? <a onclick="toggleForm('login')">Login Here</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- JavaScript to toggle between Login and Sign Up -->
    <script>
        function toggleForm(formType) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            
            if (formType === 'signup') {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
            } else {
                signupForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
            }
        }
    </script>

</body>
</html>
